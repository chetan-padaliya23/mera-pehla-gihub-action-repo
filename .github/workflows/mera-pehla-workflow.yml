name: Mera Pehla GitHub Action

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  mera-pehla-job:
    runs-on: ubuntu-latest
    
    steps:
      - name: Code checkout
        uses: actions/checkout@v3
      
      - name: Hello print
        run: echo "Hello Bhai! GitHub Actions chal raha hai!"
      
      - name: File check
        run: |
          echo "=== Repo ki files ==="
          ls -la
          echo "=== README content ==="
          cat README.md
          echo "=== Kitni files hain ==="
          ls | wc -l
          
      - name: Success message
        run: |
          echo " Sab sahi chal raha hai!"
          echo " Tera pipeline successful raha!"
