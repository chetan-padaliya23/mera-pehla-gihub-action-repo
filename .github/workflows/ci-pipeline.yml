name: CI Pipeline - Test aur Build

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:

  # JOB 1 - Code Quality Check
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Code checkout
        uses: actions/checkout@v3
      
      - name: Python setup karo
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Dependencies install karo
        run: |
          pip install flake8
      
      - name: Flake8 se code check karo
        run: |
          echo "=== Code Quality Check ==="
          flake8 calculator.py --max-line-length=88
          echo "✅ Code quality sahi hai!"

  # JOB 2 - Tests Run Karo
  run-tests:
    name: Tests Run Karo
    runs-on: ubuntu-latest
    needs: code-quality
    
    steps:
      - name: Code checkout
        uses: actions/checkout@v3
      
      - name: Python setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Dependencies install
        run: pip install -r requirements.txt
      
      - name: Tests chalao
        run: |
          echo "=== Tests Shuru ==="
          pytest test_calculator.py -v
          echo "✅ Saare tests pass!"
      
  # JOB 3 - Build Verify
  build-verify:
    name: Build Verify Karo
    runs-on: ubuntu-latest
    needs: run-tests
    
    steps:
      - name: Code checkout
        uses: actions/checkout@v3
      
      - name: Python setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: App chalao
        run: |
          echo "=== App Running ==="
          python calculator.py
          echo "✅ App sahi chal raha hai!"
      
      - name: Success message
        run: |
          echo "================================"
          echo "✅ CI Pipeline Complete!"
          echo "✅ Code Quality - PASS"
          echo "✅ All Tests - PASS"  
          echo "✅ Build - PASS"
          echo "🚀 Code merge ke liye ready hai!"
          echo "================================"
